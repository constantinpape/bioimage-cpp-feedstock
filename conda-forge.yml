conda_build_tool: rattler-build
github:
  branch_name: main
  tooling_branch_name: main
conda_build:
  error_overlinking: true
conda_forge_output_validation: true
build_platform:
  osx_arm64: osx_64
# osx-arm64 is cross-compiled on an osx-64 host, so its arm64 test binaries cannot run on
# the build agent. Restrict tests to native platforms (skips the cross-compiled osx-arm64 tests;
# linux-64/osx-64/win-64 are still tested natively).
test: native
