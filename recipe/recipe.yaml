context:
  version: "0.3.0"

package:
  name: bioimage-cpp
  version: ${{ version }}

source:
  url: https://github.com/computational-cell-analytics/bioimage-cpp/archive/refs/tags/v${{ version }}.tar.gz
  sha256: a006b9942e5eeaf6e185bdd43a36b1cda368e0ed5324a5a8c2621ccc85fb2f4c

build:
  number: 0
  skip:
    - match(python, "<3.10")
  script:
    - if: unix
      then: export CMAKE_GENERATOR=Ninja
    - python -m pip install . -vv --no-deps --no-build-isolation

requirements:
  build:
    - ${{ compiler('cxx') }}
    - ${{ stdlib('c') }}
    - cmake
    - ninja
    # When cross-compiling (e.g. osx-arm64 built on osx-64) the host python is the
    # target arch and cannot be executed by the build script. cross-python provides a
    # build-arch interpreter that targets the host arch; python/numpy are needed at build time.
    - if: build_platform != target_platform
      then:
        - python
        - cross-python_${{ target_platform }}
        - numpy
  host:
    - python
    - pip
    - scikit-build-core >=0.10
    - nanobind >=2.0
    - numpy
  run:
    - python
    - numpy

tests:
  - python:
      imports:
        - bioimage_cpp
        - bioimage_cpp._core
        - bioimage_cpp.affinities
        - bioimage_cpp.filters
        - bioimage_cpp.graph
        - bioimage_cpp.segmentation
        - bioimage_cpp.transformation
      pip_check: true
  - script:
      - python -m pytest tests -q
    files:
      source:
        - tests/
    requirements:
      run:
        - pytest
        - pooch
        - scipy

about:
  homepage: https://github.com/computational-cell-analytics/bioimage-cpp
  summary: Dependency-light C++ bioimage analysis algorithms with Python bindings
  description: |
    bioimage-cpp provides selected bioimage analysis algorithms implemented in
    C++ with lightweight Python bindings through nanobind and a minimal runtime
    dependency footprint.
  license: MIT
  license_file: LICENSE
  documentation: https://computational-cell-analytics.github.io/bioimage-cpp/
  repository: https://github.com/computational-cell-analytics/bioimage-cpp

extra:
  recipe-maintainers:
    - constantinpape
